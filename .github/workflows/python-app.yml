name: Python Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pylint
    
    - name: Check syntax with pylint
      run: |
        pylint *.py --disable=C0111 --disable=C0103 || true
    
    - name: Verify import structure
      run: |
        python -c "from rede import teste_conexao, teste_dns; print('✓ rede.py OK')"
        python -c "from sistema import usuario_conectado, mostrar_ip; print('✓ sistema.py OK')"
        python -c "from logger import salvar_log; print('✓ logger.py OK')"
    
    - name: Check Python syntax
      run: |
        python -m py_compile main.py rede.py sistema.py logger.py
        echo "✓ All files have valid syntax"
